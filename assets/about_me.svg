<svg width="860" height="310" viewBox="0 0 860 310" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#0077b6;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="310" rx="14" fill="url(#bgGrad)"/>

  <!-- Top gradient accent -->
  <rect width="860" height="2" rx="1" fill="url(#borderGrad)"/>

  <!-- Border -->
  <rect width="860" height="310" rx="14" fill="none" stroke="#1c2d42" stroke-width="1"/>

  <!-- Top-left glow -->
  <ellipse cx="120" cy="60" rx="180" ry="100" fill="#00b4d8" opacity="0.03" filter="url(#softglow)"/>

  <!-- Window controls -->
  <circle cx="30" cy="28" r="6" fill="#ff5f57"/>
  <circle cx="50" cy="28" r="6" fill="#febc2e"/>
  <circle cx="70" cy="28" r="6" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="430" y="33" text-anchor="middle" fill="#4a6080" font-size="11" letter-spacing="1">about_me.py</text>

  <!-- Separator line -->
  <line x1="0" y1="50" x2="860" y2="50" stroke="#1c2d42" stroke-width="1"/>

  <!-- Line numbers background -->
  <rect x="0" y="50" width="46" height="260" rx="0" fill="#0a0e17" opacity="0.4"/>

  <!-- Line numbers -->
  <text x="28" y="82"  text-anchor="middle" fill="#2d4060" font-size="12">1</text>
  <text x="28" y="107" text-anchor="middle" fill="#2d4060" font-size="12">2</text>
  <text x="28" y="132" text-anchor="middle" fill="#2d4060" font-size="12">3</text>
  <text x="28" y="157" text-anchor="middle" fill="#2d4060" font-size="12">4</text>
  <text x="28" y="182" text-anchor="middle" fill="#2d4060" font-size="12">5</text>
  <text x="28" y="207" text-anchor="middle" fill="#2d4060" font-size="12">6</text>
  <text x="28" y="232" text-anchor="middle" fill="#2d4060" font-size="12">7</text>
  <text x="28" y="257" text-anchor="middle" fill="#2d4060" font-size="12">8</text>
  <text x="28" y="282" text-anchor="middle" fill="#2d4060" font-size="12">9</text>

  <!-- Code: Line 1 - class definition -->
  <text x="62" y="82" fill="#c792ea" font-size="13" font-weight="600">class</text>
  <text x="108" y="82" fill="#82aaff" font-size="13" font-weight="600" filter="url(#glow)">SeniorDataEngineer</text>
  <text x="330" y="82" fill="#89ddff" font-size="13">:</text>

  <!-- Line 2 -->
  <text x="62" y="107" fill="#4a6080" font-size="12">    # ── Identity ──────────────────────────────</text>

  <!-- Line 3 -->
  <text x="62" y="132" fill="#ffffff" font-size="13">    </text>
  <text x="86" y="132" fill="#80cbc4" font-size="13">name</text>
  <text x="136" y="132" fill="#89ddff" font-size="13">      =</text>
  <text x="170" y="132" fill="#c3e88d" font-size="13">"Ismael Elsayed"</text>

  <!-- Line 4 -->
  <text x="86" y="157" fill="#80cbc4" font-size="13">location</text>
  <text x="160" y="157" fill="#89ddff" font-size="13">   =</text>
  <text x="194" y="157" fill="#c3e88d" font-size="13">"Cairo, Egypt"</text>

  <!-- Line 5 -->
  <text x="86" y="182" fill="#80cbc4" font-size="13">focus</text>
  <text x="136" y="182" fill="#89ddff" font-size="13">      =</text>
  <text x="170" y="182" fill="#89ddff" font-size="13">[</text>
  <text x="182" y="182" fill="#c3e88d" font-size="13">"Real-Time Pipelines"</text>
  <text x="370" y="182" fill="#89ddff" font-size="13">,</text>
  <text x="382" y="182" fill="#c3e88d" font-size="13">"Big Data"</text>
  <text x="465" y="182" fill="#89ddff" font-size="13">,</text>
  <text x="477" y="182" fill="#c3e88d" font-size="13">"Data Lakehouses"</text>
  <text x="655" y="182" fill="#89ddff" font-size="13">]</text>

  <!-- Line 6 -->
  <text x="86" y="207" fill="#80cbc4" font-size="13">languages</text>
  <text x="168" y="207" fill="#89ddff" font-size="13">  =</text>
  <text x="196" y="207" fill="#89ddff" font-size="13">[</text>
  <text x="208" y="207" fill="#c3e88d" font-size="13">"Python"</text>
  <text x="275" y="207" fill="#89ddff" font-size="13">,</text>
  <text x="285" y="207" fill="#c3e88d" font-size="13">"SQL"</text>
  <text x="328" y="207" fill="#89ddff" font-size="13">,</text>
  <text x="338" y="207" fill="#c3e88d" font-size="13">"C++"</text>
  <text x="385" y="207" fill="#89ddff" font-size="13">,</text>
  <text x="395" y="207" fill="#c3e88d" font-size="13">"Bash"</text>
  <text x="441" y="207" fill="#89ddff" font-size="13">]</text>

  <!-- Line 7 -->
  <text x="86" y="232" fill="#80cbc4" font-size="13">currently</text>
  <text x="168" y="232" fill="#89ddff" font-size="13">  =</text>
  <text x="196" y="232" fill="#c3e88d" font-size="13">"Smart City IoT Safety Platform — DEPI"</text>

  <!-- Line 8 -->
  <text x="86" y="257" fill="#80cbc4" font-size="13">open_to</text>
  <text x="155" y="257" fill="#89ddff" font-size="13">    =</text>
  <text x="189" y="257" fill="#c3e88d" font-size="13">"Data Eng · Analytics Eng · Platform Eng"</text>

  <!-- Line 9 - status badge -->
  <rect x="86" y="268" width="160" height="22" rx="4" fill="#1a2d1a" stroke="#2ea043" stroke-width="1"/>
  <circle cx="100" cy="279" r="4" fill="#2ea043"/>
  <text x="112" y="283" fill="#2ea043" font-size="11" font-weight="600">● OPEN TO WORK</text>

  <!-- Cursor blink indicator -->
  <rect x="710" y="268" width="8" height="14" rx="1" fill="#00b4d8" opacity="0.8"/>

  <!-- Right side decorative dots -->
  <circle cx="826" cy="85" r="2" fill="#00b4d8" opacity="0.3"/>
  <circle cx="840" cy="85" r="2" fill="#00b4d8" opacity="0.2"/>
  <circle cx="854" cy="85" r="2" fill="#00b4d8" opacity="0.1"/>
</svg>
