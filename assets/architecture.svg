<svg width="860" height="280" viewBox="0 0 860 280" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono', 'Fira Code', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="topBorder" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#0077b6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0.2"/>
    </linearGradient>

    <!-- Node gradients -->
    <linearGradient id="node1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#112233"/>
      <stop offset="100%" style="stop-color:#0a1a2a"/>
    </linearGradient>
    <linearGradient id="node2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1200"/>
      <stop offset="100%" style="stop-color:#110d00"/>
    </linearGradient>
    <linearGradient id="node3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0800"/>
      <stop offset="100%" style="stop-color:#110500"/>
    </linearGradient>
    <linearGradient id="node4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#001a22"/>
      <stop offset="100%" style="stop-color:#001015"/>
    </linearGradient>
    <linearGradient id="node5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1a0d"/>
      <stop offset="100%" style="stop-color:#081008"/>
    </linearGradient>

    <!-- Arrow gradient -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0.2"/>
    </linearGradient>

    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bgGlow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#00b4d8" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="280" rx="14" fill="url(#bg)"/>
  <rect width="860" height="2" rx="1" fill="url(#topBorder)"/>
  <rect width="860" height="280" rx="14" fill="none" stroke="#1c2d42" stroke-width="1"/>

  <!-- Background ambient glow -->
  <ellipse cx="430" cy="160" rx="350" ry="80" fill="#00b4d8" opacity="0.02" filter="url(#bgGlow)"/>

  <!-- Header -->
  <text x="26" y="32" fill="#00b4d8" font-size="10" letter-spacing="2" font-weight="600" opacity="0.7">REFERENCE ARCHITECTURE</text>
  <circle cx="230" cy="27" r="4" fill="#2ea043"/>
  <text x="240" y="32" fill="#2ea043" font-size="10" letter-spacing="1" opacity="0.8">LIVE SYSTEM</text>

  <!-- Separator -->
  <line x1="0" y1="48" x2="860" y2="48" stroke="#1c2d42" stroke-width="1"/>

  <!-- ── NODE 1: DATA SOURCES ── -->
  <!-- x=26, width=145 -->
  <rect x="26" y="72" width="145" height="148" rx="10" fill="url(#node1)" stroke="#1c6080" stroke-width="1.5"/>
  <rect x="26" y="72" width="145" height="3" rx="2" fill="#00b4d8" opacity="0.6"/>
  <!-- Icon -->
  <text x="98" y="105" text-anchor="middle" font-size="24">🌐</text>
  <!-- Label badge -->
  <rect x="36" y="112" width="125" height="20" rx="4" fill="#00b4d8" opacity="0.12"/>
  <text x="98" y="126" text-anchor="middle" fill="#00b4d8" font-size="10" font-weight="700" letter-spacing="1">DATA SOURCES</text>
  <!-- Sub items -->
  <text x="98" y="150" text-anchor="middle" fill="#4a8090" font-size="10">IoT Sensors</text>
  <text x="98" y="166" text-anchor="middle" fill="#4a8090" font-size="10">REST APIs</text>
  <text x="98" y="182" text-anchor="middle" fill="#4a8090" font-size="10">Databases</text>
  <!-- Layer label -->
  <rect x="52" y="200" width="73" height="16" rx="3" fill="#001520"/>
  <text x="88" y="212" text-anchor="middle" fill="#2d6080" font-size="9" letter-spacing="0.5">[ RAW ]</text>

  <!-- Arrow 1 -->
  <line x1="175" y1="146" x2="205" y2="146" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Flow dots -->
  <circle cx="185" cy="146" r="2" fill="#00b4d8" opacity="0.5"/>
  <circle cx="195" cy="146" r="2" fill="#00b4d8" opacity="0.3"/>

  <!-- ── NODE 2: INGESTION ── -->
  <rect x="209" y="72" width="145" height="148" rx="10" fill="url(#node2)" stroke="#806000" stroke-width="1.5"/>
  <rect x="209" y="72" width="145" height="3" rx="2" fill="#ffb300" opacity="0.6"/>
  <text x="281" y="105" text-anchor="middle" font-size="24">📥</text>
  <rect x="219" y="112" width="125" height="20" rx="4" fill="#ffb300" opacity="0.12"/>
  <text x="281" y="126" text-anchor="middle" fill="#ffb300" font-size="10" font-weight="700" letter-spacing="1">INGESTION</text>
  <text x="281" y="150" text-anchor="middle" fill="#80600a" font-size="10">Apache Kafka</text>
  <text x="281" y="166" text-anchor="middle" fill="#80600a" font-size="10">Producers</text>
  <text x="281" y="182" text-anchor="middle" fill="#80600a" font-size="10">Batch Jobs</text>
  <rect x="232" y="200" width="99" height="16" rx="3" fill="#1a1000"/>
  <text x="281" y="212" text-anchor="middle" fill="#5a4000" font-size="9" letter-spacing="0.5">[ INGESTED ]</text>

  <!-- Arrow 2 -->
  <line x1="358" y1="146" x2="388" y2="146" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <circle cx="368" cy="146" r="2" fill="#00b4d8" opacity="0.5"/>
  <circle cx="378" cy="146" r="2" fill="#00b4d8" opacity="0.3"/>

  <!-- ── NODE 3: PROCESSING ── -->
  <rect x="392" y="72" width="145" height="148" rx="10" fill="url(#node3)" stroke="#802000" stroke-width="1.5"/>
  <rect x="392" y="72" width="145" height="3" rx="2" fill="#e25a1c" opacity="0.7"/>
  <text x="464" y="105" text-anchor="middle" font-size="24">⚡</text>
  <rect x="402" y="112" width="125" height="20" rx="4" fill="#e25a1c" opacity="0.12"/>
  <text x="464" y="126" text-anchor="middle" fill="#e25a1c" font-size="10" font-weight="700" letter-spacing="1">PROCESSING</text>
  <text x="464" y="150" text-anchor="middle" fill="#804020" font-size="10">Apache Spark</text>
  <text x="464" y="166" text-anchor="middle" fill="#804020" font-size="10">Structured</text>
  <text x="464" y="182" text-anchor="middle" fill="#804020" font-size="10">Streaming</text>
  <rect x="400" y="200" width="127" height="16" rx="3" fill="#1a0800"/>
  <text x="464" y="212" text-anchor="middle" fill="#5a2800" font-size="9" letter-spacing="0.5">[ TRANSFORMED ]</text>

  <!-- Arrow 3 -->
  <line x1="541" y1="146" x2="571" y2="146" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <circle cx="551" cy="146" r="2" fill="#00b4d8" opacity="0.5"/>
  <circle cx="561" cy="146" r="2" fill="#00b4d8" opacity="0.3"/>

  <!-- ── NODE 4: STORAGE ── -->
  <rect x="575" y="72" width="145" height="148" rx="10" fill="url(#node4)" stroke="#005060" stroke-width="1.5"/>
  <rect x="575" y="72" width="145" height="3" rx="2" fill="#00add8" opacity="0.6"/>
  <text x="647" y="105" text-anchor="middle" font-size="24">🗄️</text>
  <rect x="585" y="112" width="125" height="20" rx="4" fill="#00add8" opacity="0.12"/>
  <text x="647" y="126" text-anchor="middle" fill="#00add8" font-size="10" font-weight="700" letter-spacing="1">STORAGE</text>
  <text x="647" y="150" text-anchor="middle" fill="#005a70" font-size="10">Delta Lake</text>
  <text x="647" y="166" text-anchor="middle" fill="#005a70" font-size="10">PostgreSQL</text>
  <text x="647" y="182" text-anchor="middle" fill="#005a70" font-size="10">Data Whse</text>
  <rect x="604" y="200" width="86" height="16" rx="3" fill="#001520"/>
  <text x="647" y="212" text-anchor="middle" fill="#004a60" font-size="9" letter-spacing="0.5">[ GOLD ]</text>

  <!-- Arrow 4 -->
  <line x1="724" y1="146" x2="754" y2="146" stroke="url(#arrowGrad)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <circle cx="734" cy="146" r="2" fill="#00b4d8" opacity="0.5"/>
  <circle cx="744" cy="146" r="2" fill="#00b4d8" opacity="0.3"/>

  <!-- ── NODE 5: ANALYTICS ── -->
  <rect x="758" y="72" width="78" height="148" rx="10" fill="url(#node5)" stroke="#205020" stroke-width="1.5"/>
  <rect x="758" y="72" width="78" height="3" rx="2" fill="#2ea043" opacity="0.7"/>
  <text x="797" y="105" text-anchor="middle" font-size="22">📊</text>
  <rect x="764" y="112" width="66" height="20" rx="4" fill="#2ea043" opacity="0.12"/>
  <text x="797" y="126" text-anchor="middle" fill="#2ea043" font-size="9" font-weight="700" letter-spacing="0.5">ANALYTICS</text>
  <text x="797" y="150" text-anchor="middle" fill="#205030" font-size="9">Power BI</text>
  <text x="797" y="165" text-anchor="middle" fill="#205030" font-size="9">Streamlit</text>
  <text x="797" y="180" text-anchor="middle" fill="#205030" font-size="9">AI Chatbot</text>
  <rect x="766" y="200" width="62" height="16" rx="3" fill="#0d1a0d"/>
  <text x="797" y="212" text-anchor="middle" fill="#204a20" font-size="9" letter-spacing="0.5">[ INSIGHT ]</text>

  <!-- Bottom status bar -->
  <line x1="0" y1="238" x2="860" y2="238" stroke="#1c2d42" stroke-width="1"/>
  <circle cx="26" cy="256" r="3" fill="#2ea043"/>
  <text x="36" y="260" fill="#2ea043" font-size="10" opacity="0.7">PIPELINE ACTIVE</text>
  <text x="430" y="260" text-anchor="middle" fill="#2d4060" font-size="10">5 STAGES · END-TO-END · CONTAINERISED WITH DOCKER</text>
  <text x="844" y="260" text-anchor="end" fill="#2d4060" font-size="10">v1.0</text>
</svg>
