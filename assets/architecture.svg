  </defs>

  <!-- card background -->
  <rect width="1180" height="420" rx="18" fill="#0A0908"/>
  <rect width="1180" height="420" rx="18" fill="none" stroke="#2B2419" stroke-width="1"/>
  <rect x="24" y="0" width="1132" height="2" fill="url(#topline)"/>

  <!-- header -->
  <text x="30" y="34" fill="#837C6B" font-size="10" letter-spacing="2" font-weight="600">REFERENCE ARCHITECTURE — SMART CITY GAS &amp; AIR SAFETY PLATFORM</text>
  <circle cx="1122" cy="29" r="3.5" fill="#7E9A72"/>
  <text x="1132" y="33" text-anchor="end" fill="#7E9A72" font-size="10" letter-spacing="1">9 SERVICES</text>
  <line x1="24" y1="50" x2="1156" y2="50" stroke="#2B2419" stroke-width="1"/>

  <!-- tier labels -->
  <text x="530" y="78" text-anchor="middle" fill="#837C6B" font-size="9" letter-spacing="2">PROCESS — MEDALLION (PARALLEL, ISOLATED STREAMING QUERIES)</text>
  <text x="1065" y="78" text-anchor="middle" fill="#837C6B" font-size="9" letter-spacing="2">SERVE</text>

  <!-- edges (base) -->
  <g stroke="#2B2419" stroke-width="1.4" fill="none">
    <path d="M150,220 L230,220"/>
    <path d="M360,220 Q410,140 460,90"/>
    <path d="M360,220 L460,220"/>
    <path d="M360,220 Q410,300 460,350"/>
    <path d="M600,350 Q660,300 700,220"/>
    <path d="M840,220 Q900,140 980,90"/>
    <path d="M840,220 L980,220"/>
    <path d="M840,220 Q900,300 980,350"/>
  </g>
  <!-- edges (flow accent, static — GitHub strips SVG animation from README previews in some clients, so this is a solid accent, not relied on to animate) -->
  <g stroke-width="1.8" fill="none" stroke-linecap="round">
    <path d="M150,220 L230,220" stroke="#C9A227"/>
    <path d="M360,220 Q410,140 460,90" stroke="#A9754A"/>
    <path d="M360,220 L460,220" stroke="#B7B1A2"/>
    <path d="M360,220 Q410,300 460,350" stroke="#C9A227"/>
    <path d="M600,350 Q660,300 700,220" stroke="#C9A227"/>
    <path d="M840,220 Q900,140 980,90" stroke="#6F93A6"/>
