  <!-- footer -->
  <line x1="24" y1="396" x2="1156" y2="396" stroke="#2B2419" stroke-width="1"/>
  <circle cx="30" cy="408" r="3" fill="#7E9A72"/>
  <text x="40" y="412" fill="#7E9A72" font-size="9">DOCKER COMPOSE · 1 COMMAND</text>
  <text x="590" y="412" text-anchor="middle" fill="#4a4638" font-size="9">BRONZE → SILVER → GOLD · EACH AN INDEPENDENT, ISOLATED STREAM</text>
  <text x="1150" y="412" text-anchor="end" fill="#4a4638" font-size="9">v2.0</text>
