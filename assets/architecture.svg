  <text x="530" y="346" text-anchor="middle" fill="#F4EFE4" font-size="11" font-weight="600">Gold</text>
  <text x="530" y="363" text-anchor="middle" fill="#837C6B" font-size="9">aggregated · 30s</text>

  <!-- SQL Server -->
  <rect x="700" y="185" width="140" height="70" rx="10" fill="#161310" stroke="#2B2419"/>
  <rect x="700" y="185" width="4" height="70" fill="#C9A227"/>
  <text x="770" y="216" text-anchor="middle" fill="#F4EFE4" font-size="11" font-weight="600">SQL Server</text>
  <text x="770" y="233" text-anchor="middle" fill="#837C6B" font-size="9">gold schema only</text>

  <!-- Grafana -->
  <rect x="980" y="60" width="170" height="60" rx="10" fill="#161310" stroke="#2B2419"/>
  <rect x="980" y="60" width="4" height="60" fill="#6F93A6"/>
  <text x="1065" y="86" text-anchor="middle" fill="#F4EFE4" font-size="11" font-weight="600">Grafana</text>
  <text x="1065" y="103" text-anchor="middle" fill="#837C6B" font-size="9">ops dashboard</text>

