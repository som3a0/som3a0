<svg width="1180" height="420" viewBox="0 0 1180 420" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono','SFMono-Regular',Consolas,monospace">
  <defs>
    <linearGradient id="topline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A227" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C9A227" stop-opacity="0.9"/>
