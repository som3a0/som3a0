  <rect x="980" y="190" width="170" height="60" rx="10" fill="#161310" stroke="#2B2419"/>
  <rect x="980" y="190" width="4" height="60" fill="#6F93A6"/>
  <text x="1065" y="216" text-anchor="middle" fill="#F4EFE4" font-size="11" font-weight="600">React Command Center</text>
  <text x="1065" y="233" text-anchor="middle" fill="#837C6B" font-size="9">public dashboard</text>

  <!-- ARIA -->
